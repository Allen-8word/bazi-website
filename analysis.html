<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#F5F1EB">

<title>命理分析報告｜八字命盤</title>
<meta name="description" content="依傳統命理典籍推算的詳細分析報告，包含命主特質、五行能量分布、十神結構與流年運勢。">
<meta name="robots" content="noindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg-primary: #F5F1EB;
  --bg-secondary: #E8E2D5;
  --bg-card: #FFFFFF;
  --color-main: #8B9D83;
  --color-accent: #C9A87C;
  --color-accent-dark: #B89569;
  --color-mystic: #6B7B8C;
  --color-text: #3D3A36;
  --color-text-sub: #7A756D;
  --color-pos: #5A7A4E;
  --color-warn: #B89569;
  --color-neg: #B85454;
  --shadow-soft: 0 2px 12px rgba(61, 58, 54, 0.06);
  --radius-md: 8px;
  --radius-lg: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--color-text);
  line-height: 1.7;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 720px; margin: 0 auto; padding: 0 1rem; }

.site-header {
  padding: 1.25rem 0;
  text-align: center;
  border-bottom: 1px solid rgba(232, 226, 213, 0.6);
}
.site-header .brand {
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  letter-spacing: 4px;
  font-weight: 500;
}

.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--color-mystic);
  cursor: pointer;
  margin: 1.25rem 0 0.75rem;
  background: none;
  border: none;
  font-family: inherit;
  padding: 8px 12px;
  border-radius: var(--radius-md);
  transition: background 0.2s;
}
.btn-back:hover { background: var(--bg-secondary); }

.report-header {
  text-align: center;
  padding: 1.25rem 0 2rem;
}
.report-header .badge {
  display: inline-block;
  padding: 5px 16px;
  background: var(--bg-secondary);
  color: var(--color-mystic);
  font-size: 11px;
  border-radius: 20px;
  letter-spacing: 3px;
  margin-bottom: 1rem;
}
.report-header h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 24px;
  letter-spacing: 2px;
  font-weight: 500;
  color: var(--color-text);
  margin-bottom: 8px;
}
.report-header .meta {
  font-size: 12px;
  color: var(--color-text-sub);
  letter-spacing: 0.5px;
}

.report-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 1.5rem 1.25rem;
  border: 1px solid var(--bg-secondary);
  box-shadow: var(--shadow-soft);
  margin-bottom: 1.25rem;
}
.card-section-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 11px;
  color: var(--color-text-sub);
  letter-spacing: 5px;
  text-align: center;
  margin-bottom: 1.25rem;
  font-weight: 500;
}

.dm-imagery {
  text-align: center;
  margin-bottom: 1rem;
}
.dm-imagery .stem-big {
  font-family: 'Noto Serif TC', serif;
  font-size: 56px;
  line-height: 1;
  font-weight: 500;
  margin-bottom: 6px;
}
.dm-imagery .img-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  letter-spacing: 4px;
  color: var(--color-text);
  margin-bottom: 4px;
}
.dm-imagery .img-sub {
  font-size: 12px;
  color: var(--color-accent);
  letter-spacing: 2px;
}
.dm-keywords {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin: 1rem 0;
}
.dm-keywords span {
  font-size: 12px;
  padding: 4px 12px;
  background: var(--bg-primary);
  color: var(--color-text);
  border-radius: 12px;
}

.cat-block { margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px dashed #EFE9DD; }
.cat-block:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
.cat-label {
  font-size: 11px;
  color: var(--color-mystic);
  letter-spacing: 3px;
  margin-bottom: 10px;
}
.cat-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 6px 0;
  font-size: 13px;
  line-height: 1.8;
  color: #4D4944;
}
.cat-bullet {
  flex-shrink: 0;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #FFF;
  margin-top: 4px;
}
.b-info { background: var(--color-mystic); }
.b-pos { background: var(--color-pos); }
.b-warn { background: var(--color-warn); }
.b-think { background: var(--color-accent); }

.radar-wrap { display: flex; justify-content: center; margin: 1rem 0; }
.radar-svg { width: 100%; max-width: 320px; height: auto; }

.element-summary {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px dashed #EFE9DD;
  text-align: center;
}
.element-summary .el-label { font-size: 11px; }
.element-summary .el-value { font-size: 14px; color: var(--color-text); font-weight: 500; margin-top: 2px; }
.el-wood-text { color: #5A7A4E; }
.el-fire-text { color: #B85454; }
.el-earth-text { color: #B89569; }
.el-metal-text { color: #6F7378; }
.el-water-text { color: #4A5868; }

.body-strength {
  display: inline-block;
  padding: 4px 14px;
  background: rgba(139, 157, 131, 0.15);
  color: #5A6B53;
  font-size: 12px;
  border-radius: 12px;
  letter-spacing: 1px;
  margin-top: 8px;
}

.tg-bars { margin-top: 1rem; }
.tg-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.tg-bar-row .tg-name {
  width: 48px;
  font-size: 12px;
  color: var(--color-text-sub);
}
.tg-bar-row .tg-bar {
  flex: 1;
  height: 18px;
  background: var(--bg-primary);
  border-radius: 9px;
  overflow: hidden;
}
.tg-bar-fill {
  height: 100%;
  background: var(--color-main);
  border-radius: 9px;
  transition: width 0.6s ease;
}
.tg-bar-row .tg-count {
  width: 22px;
  font-size: 11px;
  color: var(--color-text);
  text-align: right;
}

.persona-summary {
  margin-top: 1.25rem;
  padding: 1rem;
  background: rgba(139, 157, 131, 0.08);
  border-radius: var(--radius-md);
  font-size: 13px;
  color: #4D4944;
  line-height: 1.85;
}
.persona-tag {
  display: inline-block;
  padding: 3px 10px;
  background: var(--color-main);
  color: #FFF;
  font-size: 12px;
  border-radius: 10px;
  margin-right: 6px;
  letter-spacing: 1px;
}

.fy-year-strip {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 4px 0 12px;
  margin-bottom: 1rem;
}
.fy-year-cell {
  flex-shrink: 0;
  min-width: 62px;
  padding: 8px 4px;
  background: var(--bg-primary);
  border-radius: var(--radius-md);
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.fy-year-cell:hover { background: #EDE6D9; }
.fy-year-cell.active {
  background: var(--color-main);
  color: #FFF;
}
.fy-year-cell .y-label { font-size: 10px; opacity: 0.85; }
.fy-year-cell .gz { font-family: 'Noto Serif TC', serif; font-size: 14px; margin-top: 2px; }

.disclaimer-bottom {
  font-size: 11px;
  color: var(--color-text-sub);
  text-align: center;
  padding: 1.5rem 1rem 0.5rem;
  line-height: 1.8;
}

.site-footer {
  text-align: center;
  padding: 2rem 1rem 1.5rem;
  border-top: 1px solid rgba(232, 226, 213, 0.6);
  margin-top: 2rem;
}
.site-footer p { font-size: 11px; color: var(--color-text-sub); line-height: 2; }
.site-footer a { color: var(--color-mystic); text-decoration: none; margin: 0 8px; }
.site-footer a:hover { text-decoration: underline; }

#errBox {
  display: none;
  background: #FCF3F3;
  border: 1px solid #C97C7C;
  border-radius: var(--radius-md);
  padding: 1rem;
  margin: 2rem 0;
  font-size: 13px;
  color: #B85454;
  text-align: center;
}
#errBox.show { display: block; }

/* === 動作列：返回 + 下載 PDF === */
.action-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 1.25rem 0 0.75rem;
  gap: 12px;
  flex-wrap: wrap;
}
.btn-download {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--color-accent);
  color: #FFF;
  border: none;
  padding: 10px 20px;
  border-radius: var(--radius-md);
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 500;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(201, 168, 124, 0.3);
}
.btn-download:hover { background: var(--color-accent-dark); transform: translateY(-1px); }
.btn-download:active { transform: scale(0.97); }
.btn-download:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-download .dl-icon { font-size: 16px; line-height: 1; }
.btn-download.printing .dl-text::after {
  content: '';
  display: inline-block;
  width: 12px;
  text-align: left;
  animation: dots 1.4s steps(4, end) infinite;
}
@keyframes dots {
  0%, 20% { content: ''; }
  40% { content: '.'; }
  60% { content: '..'; }
  80%, 100% { content: '...'; }
}

/* === 強化圖卡：命主特質的「印章式」標題 === */
.dm-imagery {
  position: relative;
  padding: 1.25rem 1rem;
  background: linear-gradient(135deg, rgba(201, 168, 124, 0.08), rgba(139, 157, 131, 0.06));
  border-radius: var(--radius-md);
  margin-bottom: 1rem;
}
.dm-imagery::before, .dm-imagery::after {
  content: '';
  position: absolute;
  width: 24px;
  height: 24px;
  border-style: solid;
  border-color: var(--color-accent);
  opacity: 0.5;
}
.dm-imagery::before {
  top: 6px; left: 6px;
  border-width: 1px 0 0 1px;
}
.dm-imagery::after {
  bottom: 6px; right: 6px;
  border-width: 0 1px 1px 0;
}

/* === 強化圖卡：人格畫像的「主導/輔助」雙欄圖卡 === */
.persona-dual {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 1rem;
}
.persona-side {
  padding: 14px 10px;
  border-radius: var(--radius-md);
  text-align: center;
  border: 1.5px solid transparent;
}
.persona-side.main {
  background: rgba(201, 168, 124, 0.12);
  border-color: var(--color-accent);
}
.persona-side.sub {
  background: rgba(107, 123, 140, 0.08);
  border-color: rgba(107, 123, 140, 0.3);
}
.persona-side .ps-role {
  font-size: 11px;
  letter-spacing: 3px;
  margin-bottom: 6px;
}
.persona-side.main .ps-role { color: var(--color-accent); }
.persona-side.sub .ps-role { color: var(--color-mystic); }
.persona-side .ps-name {
  font-family: 'Noto Serif TC', serif;
  font-size: 22px;
  letter-spacing: 4px;
  color: var(--color-text);
  font-weight: 500;
  margin-bottom: 4px;
}
.persona-side .ps-cat {
  font-size: 11px;
  color: var(--color-text-sub);
}

/* === 流年圖卡：流年大字呈現 === */
.fy-highlight {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 1rem;
  background: linear-gradient(135deg, rgba(201, 168, 124, 0.1), rgba(139, 157, 131, 0.06));
  border-radius: var(--radius-md);
  margin-bottom: 1rem;
}
.fy-highlight .fy-big {
  font-family: 'Noto Serif TC', serif;
  font-size: 36px;
  font-weight: 500;
  line-height: 1;
  color: var(--color-text);
  letter-spacing: 4px;
}
.fy-highlight .fy-info {
  flex: 1;
  text-align: right;
}
.fy-highlight .fy-y { font-size: 13px; color: var(--color-text-sub); letter-spacing: 2px; }
.fy-highlight .fy-tg { font-size: 12px; color: var(--color-accent); margin-top: 4px; }

/* === PDF 內專用頁尾（網頁上隱藏） === */
.pdf-footer {
  display: none;
  font-size: 10px;
  color: var(--color-text-sub);
  text-align: center;
  padding: 0.75rem;
  border-top: 1px solid var(--bg-secondary);
  margin-top: 1rem;
  letter-spacing: 0.5px;
}

/* === PDF 下載中遮罩 === */
.pdf-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(61, 58, 54, 0.65);
  z-index: 9999;
  align-items: center;
  justify-content: center;
}
.pdf-overlay.show { display: flex; }
.pdf-overlay-inner {
  background: #FFF;
  padding: 2rem 2.5rem;
  border-radius: var(--radius-lg);
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.pdf-spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--bg-secondary);
  border-top-color: var(--color-accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.pdf-msg {
  font-size: 14px;
  color: var(--color-text);
  letter-spacing: 1px;
}

/* === 列印 / PDF 模式專用樣式（產 PDF 時觸發） === */
.pdf-mode .action-bar,
.pdf-mode .site-header,
.pdf-mode .site-footer,
.pdf-mode .fy-year-strip {
  display: none !important;
}
.pdf-mode .pdf-footer { display: block !important; }
.pdf-mode .report-card { break-inside: avoid; page-break-inside: avoid; }
.pdf-mode .fy-year-cell:not(.active) { display: none !important; }

/* ============================================
   列印（PDF 另存）專用樣式
   使用瀏覽器原生 window.print() 觸發
   ============================================ */
@page {
  size: A4 portrait;
  margin: 14mm 12mm 14mm 12mm;
}

@media print {
  /* 隱藏不該出現在 PDF 中的元素 */
  .action-bar,
  .site-header,
  .site-footer,
  .fy-year-strip,
  .pdf-overlay,
  #errBox {
    display: none !important;
  }

  /* 顯示 PDF 專用頁尾 */
  .pdf-footer {
    display: block !important;
  }

  /* 流年區只顯示當前選中的年份 */
  .fy-year-cell:not(.active) {
    display: none !important;
  }

  /* 基礎重設 */
  html, body {
    background: #FFFFFF !important;
    color: #2B2826 !important;
    font-size: 11pt !important;
    line-height: 1.7 !important;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  body {
    margin: 0 !important;
    padding: 0 !important;
  }
  .container {
    max-width: 100% !important;
    padding: 0 !important;
  }
  main {
    padding: 0 !important;
  }

  /* 報告標題：固定第一頁開頭 */
  .report-header {
    text-align: center;
    padding: 0 0 16pt;
    margin-bottom: 14pt;
    border-bottom: 1px solid #C9A87C;
    break-after: avoid;
    page-break-after: avoid;
  }
  .report-header .badge {
    display: inline-block;
    padding: 4pt 14pt;
    border: 1px solid #C9A87C;
    color: #B89569;
    font-size: 9pt;
    border-radius: 20pt;
    letter-spacing: 4pt;
    margin-bottom: 8pt;
    background: transparent !important;
  }
  .report-header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 22pt;
    letter-spacing: 4pt;
    font-weight: 500;
    color: #2B2826 !important;
    margin: 6pt 0 4pt;
  }
  .report-header .meta {
    font-size: 10pt;
    color: #6B6660 !important;
    letter-spacing: 1pt;
  }

  /* 每張卡片：避免被切到中間 */
  .report-card {
    background: #FFFFFF !important;
    border: 1px solid #E0DBCF !important;
    border-radius: 8pt !important;
    padding: 14pt 12pt !important;
    margin: 0 0 12pt !important;
    box-shadow: none !important;
    break-inside: avoid !important;
    page-break-inside: avoid !important;
  }

  /* 區塊標題 */
  .card-section-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 9pt !important;
    color: #6B6660 !important;
    letter-spacing: 5pt !important;
    margin-bottom: 14pt !important;
    padding-bottom: 8pt;
    border-bottom: 1px dashed #E0DBCF;
  }

  /* 命主特質卡片 */
  .dm-imagery {
    background: #FAF6EF !important;
    border-radius: 6pt !important;
    padding: 14pt !important;
    margin-bottom: 10pt !important;
  }
  .dm-imagery .stem-big {
    font-size: 44pt !important;
    line-height: 1 !important;
  }
  .dm-imagery .img-title {
    font-size: 14pt !important;
    letter-spacing: 4pt !important;
    margin: 6pt 0 2pt;
  }
  .dm-imagery .img-sub {
    font-size: 9pt !important;
    color: #B89569 !important;
    letter-spacing: 2pt;
  }
  .dm-keywords span {
    font-size: 9pt !important;
    padding: 2pt 10pt !important;
    background: #F5F1EB !important;
    border-radius: 10pt !important;
    margin: 0 3pt;
  }

  /* 內容區塊 */
  .cat-block {
    margin-top: 10pt !important;
    padding-top: 10pt !important;
    border-top: 1px dashed #EFE9DD !important;
  }
  .cat-block:first-of-type {
    margin-top: 0 !important;
    padding-top: 0 !important;
    border-top: none !important;
  }
  .cat-label {
    font-size: 9pt !important;
    color: #6B7B8C !important;
    letter-spacing: 3pt !important;
    margin-bottom: 6pt !important;
    font-weight: 500;
  }
  .cat-item {
    padding: 3pt 0 !important;
    font-size: 10pt !important;
    line-height: 1.75 !important;
    color: #3D3A36 !important;
  }
  .cat-bullet {
    width: 14pt !important;
    height: 14pt !important;
    font-size: 8pt !important;
    margin-top: 3pt !important;
  }
  .b-info  { background: #6B7B8C !important; }
  .b-pos   { background: #5A7A4E !important; }
  .b-warn  { background: #B89569 !important; }
  .b-think { background: #C9A87C !important; }

  /* 五行雷達圖 */
  .radar-svg {
    max-width: 280pt !important;
  }
  .element-summary {
    padding-top: 10pt !important;
    margin-top: 10pt !important;
  }
  .element-summary .el-label {
    font-size: 9pt !important;
  }
  .element-summary .el-value {
    font-size: 12pt !important;
  }
  .body-strength {
    background: #F0EBE0 !important;
    color: #6B6660 !important;
    font-size: 10pt !important;
    padding: 4pt 14pt !important;
    margin-top: 10pt !important;
    border-radius: 12pt !important;
  }

  /* 十神長條圖 */
  .tg-bar-row {
    margin-bottom: 6pt !important;
  }
  .tg-bar-row .tg-name {
    font-size: 10pt !important;
    width: 42pt !important;
  }
  .tg-bar {
    height: 14pt !important;
    background: #F5F1EB !important;
  }
  .tg-bar-fill {
    background: #8B9D83 !important;
  }
  .tg-bar-row .tg-count {
    font-size: 9pt !important;
  }

  /* 綜合人格畫像 */
  .persona-dual {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
    gap: 8pt !important;
    margin-bottom: 12pt !important;
  }
  .persona-side {
    padding: 12pt !important;
    border: 1.5px solid transparent !important;
    border-radius: 6pt !important;
    text-align: center !important;
  }
  .persona-side.main {
    background: #FAF1E0 !important;
    border-color: #C9A87C !important;
  }
  .persona-side.sub {
    background: #F0EFEE !important;
    border-color: #B5BCC5 !important;
  }
  .persona-side .ps-role {
    font-size: 9pt !important;
    letter-spacing: 3pt !important;
    margin-bottom: 4pt;
  }
  .persona-side.main .ps-role { color: #B89569 !important; }
  .persona-side.sub .ps-role  { color: #6B7B8C !important; }
  .persona-side .ps-name {
