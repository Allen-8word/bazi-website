<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#F5F1EB">

<title>命理分析報告｜八字命盤</title>
<meta name="description" content="依傳統命理典籍推算的詳細分析報告，包含命主特質、五行能量分布、十神結構與流年運勢。">
<meta name="robots" content="noindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg-primary: #F5F1EB;
  --bg-secondary: #E8E2D5;
  --bg-card: #FFFFFF;
  --color-main: #8B9D83;
  --color-accent: #C9A87C;
  --color-accent-dark: #B89569;
  --color-mystic: #6B7B8C;
  --color-text: #3D3A36;
  --color-text-sub: #7A756D;
  --color-pos: #5A7A4E;
  --color-warn: #B89569;
  --color-neg: #B85454;
  --shadow-soft: 0 2px 12px rgba(61, 58, 54, 0.06);
  --radius-md: 8px;
  --radius-lg: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--color-text);
  line-height: 1.7;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 720px; margin: 0 auto; padding: 0 1rem; }

.site-header {
  padding: 1.25rem 0;
  text-align: center;
  border-bottom: 1px solid rgba(232, 226, 213, 0.6);
}
.site-header .brand {
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  letter-spacing: 4px;
  font-weight: 500;
}

.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--color-mystic);
  cursor: pointer;
  margin: 1.25rem 0 0.75rem;
  background: none;
  border: none;
  font-family: inherit;
  padding: 8px 12px;
  border-radius: var(--radius-md);
  transition: background 0.2s;
}
.btn-back:hover { background: var(--bg-secondary); }

.report-header {
  text-align: center;
  padding: 1.25rem 0 2rem;
}
.report-header .badge {
  display: inline-block;
  padding: 5px 16px;
  background: var(--bg-secondary);
  color: var(--color-mystic);
  font-size: 11px;
  border-radius: 20px;
  letter-spacing: 3px;
  margin-bottom: 1rem;
}
.report-header h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 24px;
  letter-spacing: 2px;
  font-weight: 500;
  color: var(--color-text);
  margin-bottom: 8px;
}
.report-header .meta {
  font-size: 12px;
  color: var(--color-text-sub);
  letter-spacing: 0.5px;
}

.report-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 1.5rem 1.25rem;
  border: 1px solid var(--bg-secondary);
  box-shadow: var(--shadow-soft);
  margin-bottom: 1.25rem;
}
.card-section-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 11px;
  color: var(--color-text-sub);
  letter-spacing: 5px;
  text-align: center;
  margin-bottom: 1.25rem;
  font-weight: 500;
}

.dm-imagery {
  text-align: center;
  margin-bottom: 1rem;
}
.dm-imagery .stem-big {
  font-family: 'Noto Serif TC', serif;
  font-size: 56px;
  line-height: 1;
  font-weight: 500;
  margin-bottom: 6px;
}
.dm-imagery .img-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  letter-spacing: 4px;
  color: var(--color-text);
  margin-bottom: 4px;
}
.dm-imagery .img-sub {
  font-size: 12px;
  color: var(--color-accent);
  letter-spacing: 2px;
}
.dm-keywords {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin: 1rem 0;
}
.dm-keywords span {
  font-size: 12px;
  padding: 4px 12px;
  background: var(--bg-primary);
  color: var(--color-text);
  border-radius: 12px;
}

.cat-block { margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px dashed #EFE9DD; }
.cat-block:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
.cat-label {
  font-size: 11px;
  color: var(--color-mystic);
  letter-spacing: 3px;
  margin-bottom: 10px;
}
.cat-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 6px 0;
  font-size: 13px;
  line-height: 1.8;
  color: #4D4944;
}
.cat-bullet {
  flex-shrink: 0;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #FFF;
  margin-top: 4px;
}
.b-info { background: var(--color-mystic); }
.b-pos { background: var(--color-pos); }
.b-warn { background: var(--color-warn); }
.b-think { background: var(--color-accent); }

.radar-wrap { display: flex; justify-content: center; margin: 1rem 0; }
.radar-svg { width: 100%; max-width: 320px; height: auto; }

.element-summary {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px dashed #EFE9DD;
  text-align: center;
}
.element-summary .el-label { font-size: 11px; }
.element-summary .el-value { font-size: 14px; color: var(--color-text); font-weight: 500; margin-top: 2px; }
.el-wood-text { color: #5A7A4E; }
.el-fire-text { color: #B85454; }
.el-earth-text { color: #B89569; }
.el-metal-text { color: #6F7378; }
.el-water-text { color: #4A5868; }

.body-strength {
  display: inline-block;
  padding: 4px 14px;
  background: rgba(139, 157, 131, 0.15);
  color: #5A6B53;
  font-size: 12px;
  border-radius: 12px;
  letter-spacing: 1px;
  margin-top: 8px;
}

.tg-bars { margin-top: 1rem; }
.tg-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.tg-bar-row .tg-name {
  width: 48px;
  font-size: 12px;
  color: var(--color-text-sub);
}
.tg-bar-row .tg-bar {
  flex: 1;
  height: 18px;
  background: var(--bg-primary);
  border-radius: 9px;
  overflow: hidden;
}
.tg-bar-fill {
  height: 100%;
  background: var(--color-main);
  border-radius: 9px;
  transition: width 0.6s ease;
}
.tg-bar-row .tg-count {
  width: 22px;
  font-size: 11px;
  color: var(--color-text);
  text-align: right;
}

.persona-summary {
  margin-top: 1.25rem;
  padding: 1rem;
  background: rgba(139, 157, 131, 0.08);
  border-radius: var(--radius-md);
  font-size: 13px;
  color: #4D4944;
  line-height: 1.85;
}
.persona-tag {
  display: inline-block;
  padding: 3px 10px;
  background: var(--color-main);
  color: #FFF;
  font-size: 12px;
  border-radius: 10px;
  margin-right: 6px;
  letter-spacing: 1px;
}

.fy-year-strip {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 4px 0 12px;
  margin-bottom: 1rem;
}
.fy-year-cell {
  flex-shrink: 0;
  min-width: 62px;
  padding: 8px 4px;
  background: var(--bg-primary);
  border-radius: var(--radius-md);
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.fy-year-cell:hover { background: #EDE6D9; }
.fy-year-cell.active {
  background: var(--color-main);
  color: #FFF;
}
.fy-year-cell .y-label { font-size: 10px; opacity: 0.85; }
.fy-year-cell .gz { font-family: 'Noto Serif TC', serif; font-size: 14px; margin-top: 2px; }

.disclaimer-bottom {
  font-size: 11px;
  color: var(--color-text-sub);
  text-align: center;
  padding: 1.5rem 1rem 0.5rem;
  line-height: 1.8;
}

.site-footer {
  text-align: center;
  padding: 2rem 1rem 1.5rem;
  border-top: 1px solid rgba(232, 226, 213, 0.6);
  margin-top: 2rem;
}
.site-footer p { font-size: 11px; color: var(--color-text-sub); line-height: 2; }
.site-footer a { color: var(--color-mystic); text-decoration: none; margin: 0 8px; }
.site-footer a:hover { text-decoration: underline; }

#errBox {
  display: none;
  background: #FCF3F3;
  border: 1px solid #C97C7C;
  border-radius: var(--radius-md);
  padding: 1rem;
  margin: 2rem 0;
  font-size: 13px;
  color: #B85454;
  text-align: center;
}
#errBox.show { display: block; }

@media (max-width: 480px) {
  .dm-imagery .stem-big { font-size: 48px; }
  .element-summary { grid-template-columns: repeat(5, 1fr); gap: 4px; }
  .element-summary .el-label, .element-summary .el-value { font-size: 11px; }
  .tg-bar-row .tg-name { width: 40px; font-size: 11px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <div class="brand">八 字 命 盤</div>
  </div>
</header>

<main class="container">

<button class="btn-back" id="btnBack">← 返回命盤</button>

<div id="errBox">
  ⚠ 找不到命盤資料，請先從首頁排盤後再進入此頁
</div>

<div id="reportContent" style="display:none">

  <div class="report-header">
    <div class="badge">命 理 分 析 報 告</div>
    <h1 id="rptName">命主</h1>
    <div class="meta" id="rptMeta"></div>
  </div>

  <!-- 1. 命主特質卡片 -->
  <div class="report-card" id="cardDayMaster">
    <div class="card-section-title">命 主 特 質</div>
    <div id="dmContent"></div>
  </div>

  <!-- 2. 五行能量雷達圖 -->
  <div class="report-card" id="cardElements">
    <div class="card-section-title">五 行 能 量 分 布</div>
    <div class="radar-wrap" id="elRadarWrap"></div>
    <div class="element-summary" id="elSummary"></div>
    <div style="text-align:center"><span class="body-strength" id="bodyStrength"></span></div>
    <div id="elPersonality"></div>
  </div>

  <!-- 3. 十神結構長條圖 -->
  <div class="report-card" id="cardTenGods">
    <div class="card-section-title">十 神 結 構</div>
    <div class="tg-bars" id="tgBars"></div>
  </div>

  <!-- 4. 綜合人格畫像 -->
  <div class="report-card" id="cardPersona">
    <div class="card-section-title">綜 合 人 格 畫 像</div>
    <div id="personaContent"></div>
  </div>

  <!-- 5. 流年運勢 -->
  <div class="report-card" id="cardFlowYear">
    <div class="card-section-title">流 年 簡 易 運 勢</div>
    <div class="fy-year-strip" id="fyYearStrip"></div>
    <div id="fyContent"></div>
  </div>

  <div class="disclaimer-bottom">
    以上內容依傳統命理典籍推算，僅供個人參考<br>
    不構成任何醫療、財務、法律或人際決策建議
  </div>

</div>

</main>

<footer class="site-footer">
  <div class="container">
    <p>
      <a href="/privacy.html">隱私權政策</a> ·
      <a href="/terms.html">服務條款</a> ·
      <a href="mailto:hello@your-domain.com">聯絡我們</a>
    </p>
    <p>© 2026 八字命盤 · 本網站內容僅供命理參考</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.13/lunar.js"></script>
<script src="./data/dayMaster.js"></script>
<script src="./data/branches.js"></script>
<script src="./data/tenGods.js"></script>
<script src="./data/elements.js"></script>
<script src="./data/engine.js"></script>
<script src="./analysis.js"></script>

</body>
</html>
